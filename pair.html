<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MUZAMIL-MD | Premium Pairing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: linear-gradient(145deg, #070b14 0%, #0a1020 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    /* Glass Card */
    .glass-card {
      background: rgba(18, 24, 38, 0.92);
      backdrop-filter: blur(18px);
      border-radius: 56px;
      padding: 38px 28px;
      border: 1px solid rgba(0, 230, 118, 0.18);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .logo-area {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-circle {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #1e2a3a, #0b0f1a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(0, 230, 118, 0.2);
    }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      font-family: 'Space Grotesk', monospace;
      background: linear-gradient(115deg, #ffffff, #00ffaa, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 10px 0 5px;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: #00e676;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    .input-card {
      background: #0a0e18;
      border-radius: 44px;
      padding: 6px 6px 6px 24px;
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      border: 1px solid #1e273a;
      transition: all 0.2s;
    }

    .input-card:focus-within {
      border-color: #00e676;
      box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.2);
    }

    .input-card i {
      color: #5a6e8c;
      font-size: 18px;
    }

    .input-card input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 12px;
      color: white;
      font-size: 17px;
      font-weight: 500;
      outline: none;
      font-family: 'Inter', monospace;
    }

    .input-card input::placeholder {
      color: #2f3a50;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(100deg, #00e676, #00b0ff);
      border: none;
      padding: 18px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 18px;
      font-family: 'Space Grotesk', sans-serif;
      color: #07111a;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 28px;
      box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3);
    }

    .btn-primary:active { transform: scale(0.97); }

    .code-panel {
      background: #060913;
      border-radius: 32px;
      padding: 22px;
      border: 1px solid #00e67640;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #00e676;
      margin-bottom: 15px;
    }

    .pair-code {
      font-family: 'Space Grotesk', monospace;
      font-size: 28px;
      font-weight: 700;
      background: #00000040;
      padding: 18px;
      border-radius: 28px;
      color: #00ffcc;
      word-break: break-all;
      margin-bottom: 20px;
    }

    .btn-copy {
      background: transparent;
      border: 1.5px solid #00e676;
      padding: 12px;
      border-radius: 50px;
      color: #00e676;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }

    .footer-tip {
      margin-top: 20px;
      font-size: 11px;
      color: #4b5a78;
      text-align: center;
    }

    .hidden { display: none; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #0a0e1a;
      border-top-color: #00e676;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="logo-area">
      <div class="logo-circle">
        <img src="https://ibb.co/FbrF6NHd" class="logo" alt="MUZAMIL-MD" onerror="this.src='https://via.placeholder.com/76'">
      </div>
    </div>
    <h1>MUZAMIL-MD</h1>
    <div class="tagline">✦ PREMIUM PAIRING SYSTEM ✦</div>

    <div class="input-card">
      <i class="fas fa-mobile-alt"></i>
      <input type="tel" id="phoneNum" placeholder="923xxxxxxxxx" value="">
    </div>

    <button id="pairBtn" class="btn-primary">
      <i class="fas fa-bolt"></i> GET CODE <i class="fas fa-angle-right"></i>
    </button>

    <div id="resultPanel" class="code-panel hidden">
      <div class="panel-title"><i class="fas fa-unlock-alt"></i> YOUR PAIRING CODE</div>
      <div id="codeDisplay" class="pair-code">------</div>
      <button id="copyPairBtn" class="btn-copy"><i class="fas fa-copy"></i> COPY NOW</button>
    </div>
    <div class="footer-tip">
      <i class="fas fa-clock"></i> Code valid for 5 minutes • One-time use
    </div>
  </div>
</div>

<script>
  const phoneField = document.getElementById('phoneNum');
  const pairBtn = document.getElementById('pairBtn');
  const resultPanel = document.getElementById('resultPanel');
  const codeDisplaySpan = document.getElementById('codeDisplay');
  const copyPairBtn = document.getElementById('copyPairBtn');
  let latestCode = '';

  function setLoading(loading) {
    if (loading) {
      pairBtn.innerHTML = '<div class="spinner"></div> GENERATING...';
      pairBtn.disabled = true;
      resultPanel.classList.add('hidden');
    } else {
      pairBtn.innerHTML = '<i class="fas fa-bolt"></i> GET CODE <i class="fas fa-angle-right"></i>';
      pairBtn.disabled = false;
    }
  }

  function displayCode(code) {
    latestCode = code;
    codeDisplaySpan.innerText = code;
    resultPanel.classList.remove('hidden');
  }

  copyPairBtn.addEventListener('click', async () => {
    if (!latestCode) return;
    try {
      await navigator.clipboard.writeText(latestCode);
      copyPairBtn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
      setTimeout(() => {
        copyPairBtn.innerHTML = '<i class="fas fa-copy"></i> COPY NOW';
      }, 1800);
    } catch {
      alert('Code: ' + latestCode);
    }
  });

  async function requestPairing() {
    let number = phoneField.value.trim();
    if (!number) { alert('Enter number'); return; }
    let clean = number.replace(/[^0-9+]/g, '');
    if (clean.startsWith('+')) clean = clean.substring(1);
    if (clean.length < 9) { alert('Invalid number with country code'); return; }

    setLoading(true);
    try {
      const res = await fetch(`/pair?number=${clean}`);
      const data = await res.json();
      if (data.code && data.code !== 'Service Currently Unavailable') {
        displayCode(data.code);
      } else {
        alert('Try again. Server busy.');
      }
    } catch {
      alert('Connection error. Backend required.');
    } finally {
      setLoading(false);
    }
  }

  pairBtn.addEventListener('click', requestPairing);
  phoneField.addEventListener('keypress', (e) => { if (e.key === 'Enter') requestPairing(); });
</script>
</body>
</html>
