<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MUZAMIL-MD • Pair Session</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0f1e, #020408);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .pair-container {
      max-width: 500px;
      width: 100%;
      background: rgba(15, 25, 45, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(0, 255, 204, 0.4);
      padding: 2rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo i {
      font-size: 3.5rem;
      color: #00ffcc;
      filter: drop-shadow(0 0 8px #00ffcc);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #00ffcc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .badge {
      text-align: center;
      color: #00ffcc;
      font-size: 0.75rem;
      margin: 8px 0 25px;
      letter-spacing: 1px;
    }

    .input-field {
      background: #0f1424;
      border-radius: 60px;
      display: flex;
      align-items: center;
      padding: 0.2rem 0.2rem 0.2rem 1.2rem;
      border: 1px solid #1f2a48;
      margin-bottom: 1.2rem;
    }

    .input-field i {
      color: #00ffcc;
    }

    .input-field input {
      background: transparent;
      border: none;
      padding: 1rem;
      width: 100%;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    button {
      width: 100%;
      background: linear-gradient(95deg, #00ccaa, #0088ff);
      border: none;
      padding: 1rem;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .response-card {
      margin-top: 1.8rem;
      background: #0b1022;
      padding: 1rem;
      border-radius: 20px;
      text-align: center;
    }

    .pair-code {
      font-family: monospace;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 5px;
      color: #00ffcc;
      margin: 10px 0;
    }

    .copy-action {
      margin-top: 12px;
      background: #1f2a48;
      width: 100%;
      padding: 0.8rem;
    }

    @media (max-width: 480px) {
      .pair-container {
        padding: 1.5rem;
      }
      .pair-code {
        font-size: 1.3rem;
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
<div class="pair-container">
  <div class="logo">
    <i class="fab fa-whatsapp"></i>
  </div>
  <h1>MUZAMIL-MD PAIR</h1>
  <div class="badge">⚡ PREMIUM PAIRING SYSTEM ⚡</div>

  <div class="input-field">
    <i class="fas fa-phone-alt"></i>
    <input type="tel" id="phoneNum" placeholder="923001234567" value="92">
  </div>
  
  <button id="pairBtn"><i class="fas fa-code-branch"></i> REQUEST PAIR CODE</button>

  <div class="response-card">
    <i class="fas fa-shield-alt"></i> Your 8-digit code:
    <div id="codeDisplay" class="pair-code">———</div>
  </div>
  <button id="copyPairBtn" class="copy-action" style="display: none;">
    <i class="far fa-copy"></i> COPY CODE
  </button>
</div>

<script>
  const pairBtn = document.getElementById('pairBtn');
  const phoneNum = document.getElementById('phoneNum');
  const codeDisplay = document.getElementById('codeDisplay');
  const copyPairBtn = document.getElementById('copyPairBtn');
  let latestCode = '';

  pairBtn.addEventListener('click', async () => {
    let number = phoneNum.value.trim().replace(/\D/g, '');
    if (number.length < 10) {
      codeDisplay.innerText = '❌ Invalid';
      codeDisplay.style.color = '#ff8888';
      copyPairBtn.style.display = 'none';
      return;
    }

    codeDisplay.innerText = '⏳ ...';
    codeDisplay.style.color = '#00ffcc';
    copyPairBtn.style.display = 'none';

    try {
      const response = await fetch(`/pair?number=${number}`);
      const data = await response.json();
      if (data.code) {
        latestCode = data.code;
        codeDisplay.innerText = latestCode;
        copyPairBtn.style.display = 'block';
      } else {
        codeDisplay.innerText = '⚠️ Error';
        codeDisplay.style.color = '#ff8888';
      }
    } catch (err) {
      codeDisplay.innerText = '❌ Failed';
      codeDisplay.style.color = '#ff8888';
    }
  });

  copyPairBtn.addEventListener('click', () => {
    if (latestCode) {
      navigator.clipboard.writeText(latestCode);
      copyPairBtn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
      setTimeout(() => {
        copyPairBtn.innerHTML = '<i class="far fa-copy"></i> COPY CODE';
      }, 2000);
    }
  });
</script>
</body>
</html>
