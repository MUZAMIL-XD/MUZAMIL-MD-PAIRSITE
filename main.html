<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MUZAMIL-MD Pair Site</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #0a0a0a 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    /* Top Header */
    .site-header {
      text-align: center;
      padding: 20px 15px;
      background: linear-gradient(135deg, #0a0f1e, #0d1117);
      border-bottom: 2px solid #00ffcc;
      margin-bottom: 30px;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
    }

    .site-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffcc, #00aaff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .site-header p {
      color: #8892b0;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    /* Main Card */
    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .pair-card {
      background: rgba(18, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(0, 255, 204, 0.3);
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .profile-icon {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .profile-icon i {
      font-size: 4rem;
      color: #00ffcc;
      filter: drop-shadow(0 0 10px #00ffcc);
    }

    h2 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #00ffcc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: #a0b3d9;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      color: #00ffcc;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #0f1424;
      border: 1.5px solid #1f2a48;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.2);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(95deg, #00ccaa, #0088ff);
      border: none;
      padding: 1rem;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .result-box {
      margin-top: 1.8rem;
      background: #0b1022cc;
      padding: 1rem;
      border-radius: 20px;
      text-align: center;
      border-left: 4px solid #00ffcc;
    }

    .code-display {
      font-family: monospace;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #00ffcc;
      margin: 10px 0;
    }

    .copy-btn {
      width: 100%;
      background: #1f2a48;
      border: none;
      padding: 0.8rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      margin-top: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.7rem;
      color: #5d7199;
    }

    @media (max-width: 480px) {
      .pair-card {
        padding: 1.5rem;
      }
      h2 {
        font-size: 1.5rem;
      }
      .code-display {
        font-size: 1.2rem;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="site-header">
    <h1>✨ MUZAMIL-MD PAIR SITE ✨</h1>
    <p>Ultra Fast • Secure • Premium Pairing System</p>
  </div>

  <div class="container">
    <div class="pair-card">
      <div class="profile-icon">
        <i class="fab fa-whatsapp"></i>
      </div>
      <h2>Get Pair Code</h2>
      <div class="subtitle">Enter your WhatsApp number to receive 8-digit code</div>

      <div class="input-group">
        <label><i class="fas fa-phone"></i> WhatsApp Number</label>
        <input type="tel" id="phoneNumber" placeholder="923001234567" value="92">
      </div>

      <button class="btn-primary" id="getCodeBtn">
        <i class="fas fa-key"></i> GET CODE
      </button>

      <div class="result-box" id="resultBox">
        <i class="fas fa-shield-alt"></i> Your code will appear here
        <div id="codeValue" class="code-display">———</div>
      </div>
      <button id="copyCodeBtn" class="copy-btn" style="display: none;">
        <i class="far fa-copy"></i> COPY CODE
      </button>

      <div class="footer-note">
        ⚡ Powered by MUZAMIL-MD | Pairing System v2.0
      </div>
    </div>
  </div>

  <script>
    const getBtn = document.getElementById('getCodeBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const codeValueDiv = document.getElementById('codeValue');
    const copyBtn = document.getElementById('copyCodeBtn');
    let currentCode = '';

    getBtn.addEventListener('click', async () => {
      let number = phoneInput.value.trim().replace(/\D/g, '');
      if (number.length < 10) {
        codeValueDiv.innerText = '❌ Invalid';
        codeValueDiv.style.color = '#ff8888';
        copyBtn.style.display = 'none';
        return;
      }

      codeValueDiv.innerText = '⏳ ...';
      codeValueDiv.style.color = '#00ffcc';
      copyBtn.style.display = 'none';

      try {
        const response = await fetch(`/pair?number=${number}`);
        const data = await response.json();
        
        if (data.code) {
          currentCode = data.code;
          codeValueDiv.innerText = currentCode;
          codeValueDiv.style.color = '#00ffcc';
          copyBtn.style.display = 'block';
        } else {
          codeValueDiv.innerText = '⚠️ Error';
          codeValueDiv.style.color = '#ff8888';
        }
      } catch (err) {
        codeValueDiv.innerText = '❌ Network Error';
        codeValueDiv.style.color = '#ff8888';
      }
    });

    copyBtn.addEventListener('click', () => {
      if (currentCode) {
        navigator.clipboard.writeText(currentCode);
        copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
        setTimeout(() => {
          copyBtn.innerHTML = '<i class="far fa-copy"></i> COPY CODE';
        }, 2000);
      }
    });
  </script>
</body>
</html>
